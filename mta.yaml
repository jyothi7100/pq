_schema-version: 3.3.0
ID: admin-config
description: A simple CAP project.
version: 1.0.0
modules:
- name: admin-config-approuter
  type: approuter.nodejs
  path: app/router
  requires:
  - name: srv-api
  - name: uaa_admin-config
  - name: admin-config-destination-service
  parameters:
    disk-quota: 512M
    memory: 256M
  build-parameters:
    requires:
    - name: config
      artifacts:
      - '*.zip'
      target-path: resources/
    builder: custom
    commands:
    - npm install --production
    - unzip -o resources/config.zip -d resources
    - rm resources/config.zip
- name: admin-config-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: admin-config-db
  - name: uaa_admin-config
  - name: admin-config-destination-service
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: admin-config-db-deployer
  type: hdb
  path: db
  requires:
  - name: admin-config-db
- name: admin-config-destination-content
  type: com.sap.application.content
  requires:
  - name: admin-config-destination-service
    parameters:
      content-target: true
  - name: admin-config_html_repo_host
    parameters:
      service-key:
        name: admin-config_html_repo_host-key
  - name: uaa_admin-config
    parameters:
      service-key:
        name: uaa_admin-config-key
  parameters:
    content:
      instance:
        destinations:
        - Name: ManagedAppRouter_admin_config_html_repo_host
          ServiceInstanceName: admin-config-html5-app-host-service
          ServiceKeyName: admin-config_html_repo_host-key
          sap.cloud.service: ManagedAppRouter
        - Authentication: OAuth2UserTokenExchange
          Name: ManagedAppRouter_uaa_admin_config
          ServiceInstanceName: admin-config-xsuaa-service
          ServiceKeyName: uaa_admin-config-key
          sap.cloud.service: ManagedAppRouter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: admin-config-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: admin-config_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - config.zip
      name: config
      target-path: resources/
- name: config
  type: html5
  path: app/config
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: admin-config-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: admin-config-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: admin-config-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: admin-config_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: admin-config-html5-app-host-service
    service-plan: app-host
- name: uaa_admin-config
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: admin-config-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-name: admin-config-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
